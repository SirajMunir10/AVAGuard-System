{% extends 'base.html' %}

{% block title %}Access Denied - AVAGuard{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center;">
    <div style="width: 80px; height: 80px; margin-bottom: 24px; color: var(--accent-warning);">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10"/><path d="M12 8v4"/><path d="M12 16h.01"/></svg>
    </div>
    <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 16px; color: var(--avag-text-primary);">Access Denied</h1>
    <p style="color: var(--text-secondary); max-width: 400px; margin-bottom: 32px; font-size: 16px; line-height: 1.6;">
        You do not have permission to access this resource. Please contact your IT Administrator if you believe this is a mistake.
    </p>
    <div style="display: flex; gap: 16px; flex-wrap: wrap; justify-content: center;">
        <a href="javascript:history.back()" class="btn btn-secondary btn-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            Go Back
        </a>
        <a href="{% url 'dashboard' %}" class="btn btn-primary btn-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
            Return to Dashboard
        </a>
    </div>
</div>
{% endblock %}
