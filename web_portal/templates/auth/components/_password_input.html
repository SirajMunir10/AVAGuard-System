<div class="avag-auth-form-group">
    <label for="{{ field_id }}">{{ label }}</label>
    <div class="avag-password-wrapper">
        <input type="password" id="{{ field_id }}" name="{{ field_name }}" 
               placeholder="{{ placeholder|default:'••••••••' }}" 
               {% if required %}required{% endif %} 
               {% if minlength %}minlength="{{ minlength }}"{% endif %}
               {% if autofocus %}autofocus{% endif %}
               class="avag-password-input">
        
        <button type="button" class="avag-password-toggle" tabindex="-1" title="Toggle password visibility" aria-label="Show password">
            <!-- Eye Icon (Lucide stroke-width 1.5 for consistency) -->
            <svg class="avag-eye-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
            <!-- Eye Off Icon -->
            <svg class="avag-eye-off-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
                <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
                <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
                <line x1="2" y1="2" x2="22" y2="22"/>
            </svg>
        </button>
    </div>
</div>
