{% extends 'base.html' %}

{% block title %}Page Not Found - AVAGuard{% endblock %}

{% block content %}
<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center;">
    <div style="font-size: 80px; margin-bottom: 20px;">🔭</div>
    <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 16px; color: var(--avag-text-primary);">Page Not Found</h1>
    <p style="color: #888; max-width: 400px; margin-bottom: 32px; font-size: 16px;">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>
    <a href="{% url 'dashboard' %}" class="btn btn-primary" style="padding: 12px 24px; font-size: 16px;">
        Return to Dashboard
    </a>
</div>
{% endblock %}
