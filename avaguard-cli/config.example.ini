[azure]
# Your Azure AD Tenant ID
tenant_id = YOUR_TENANT_ID_HERE

# Your App Registration Client ID
client_id = YOUR_CLIENT_ID_HERE

# Your App Registration Client Secret
# WARNING: In production, use Azure Key Vault
client_secret = YOUR_CLIENT_SECRET_HERE

[scan]
# Azure subscription tier: free or premium
tier = free

# Default checks to run (comma-separated)
# Options: 1.1, 1.3, 1.5, 1.8, 1.11, 1.23, 2.1, 3.1, password_age, inactive_users
default_checks = 1.1,1.3,1.5,1.8,1.11,1.23,2.1,3.1,password_age,inactive_users

# Mock data mode: use mock data instead of real Azure API calls
# Set to 'true' to use mock data, 'false' to use real Azure AD
use_mock_data = false

# Path to mock data JSON file (relative to project root)
mock_data_file = AVA_mock data.json

[output]
# Output directory for reports
reports_dir = output/reports

# Output directory for logs
logs_dir = output/logs

# Report format: html, json, both
format = both

[advanced]
# API request timeout (seconds)
timeout = 30

# Maximum retries for failed API calls
max_retries = 3

# Delay between retries (seconds)
retry_delay = 5