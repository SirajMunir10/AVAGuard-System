repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files

-   repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
    -   id: black
        language_version: python3

-   repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
    -   id: flake8
        additional_dependencies: [flake8-docstrings]

-   repo: local
    hooks:
    -   id: validate-architecture
        name: Validate Core Architecture Boundaries
        entry: .venv/Scripts/python tools/validate_architecture.py
        language: system
        pass_filenames: false
        always_run: true
    -   id: validate-checks
        name: Validate Declarative Checks and Manifests
        entry: .venv/Scripts/python tools/validate_checks.py
        language: system
        pass_filenames: false
        always_run: true
