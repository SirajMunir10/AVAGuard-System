# AVAGuard CLI/Desktop - Azure Configuration
# Copy this file to config.ini and fill in your values
# DO NOT commit the actual config.ini file to version control!

[azure]
# Azure AD tenant ID (from Azure Portal > Azure Active Directory > Overview)
tenant_id = your-azure-tenant-id

# App Registration Client ID (from Azure Portal > App registrations)
client_id = your-client-id

# App Registration Client Secret (from Azure Portal > App registrations > Certificates & secrets)
client_secret = your-client-secret

[scan]
# Use mock data instead of real Azure API (true/false)
use_mock = true

# Default tier for checks (free/premium)
default_tier = free

# Output directory for reports
output_dir = output/reports

[logging]
# Log level (DEBUG, INFO, WARNING, ERROR)
level = INFO

# Log file path
file = output/logs/avaguard.log

[portal]
# Web portal base URL
url = http://localhost:8000
